name: Sync Active Sprint

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Authenticate gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status
      - name: Sync sprint file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python knowledge-base/scripts/sync_active_sprint.py . --repo ${{ github.repository }}
      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git diff --quiet && exit 0
          git add knowledge-base/active-sprint.md knowledge-base/04-active-sprint/00-index.md || true
          git commit -m "chore: sync active sprint"
          git push
